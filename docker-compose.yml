version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pwc
      POSTGRES_PASSWORD: pwc
      POSTGRES_DB: physicswithcode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://pwc:pwc@db:5432/physicswithcode
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: pnpm dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
